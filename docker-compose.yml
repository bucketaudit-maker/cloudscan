version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cloudscan-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-please}
      - DATABASE_URL=sqlite:////app/data/cloudscan.db
      - SCANNER_CONCURRENCY=50
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cloudscan-ui
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
